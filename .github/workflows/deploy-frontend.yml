name: Deploy Frontend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        run: echo "Frontend build skipped — module not yet implemented"

      - name: Upload build artifact
        run: echo "Artifact upload skipped — no build output yet"

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Frontend deploy skipped — module not yet implemented"
          echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "=========================================="