name: Deploy Frontend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [frontend-ui]

env:
  GCP_PROJECT: iikshana-mlops
  GCP_REGION: us-east4
  AR_REPO: iikshana-docker
  IMAGE: us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-frontend
  CLOUD_RUN_SERVICE: iikshana-frontend

jobs:
  deploy-frontend:
    name: Build, Push & Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            -t us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-frontend:latest \
            -f demo/Dockerfile .

      - name: Push Docker image
        run: |
          docker push us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-frontend:latest
          
      - name: Deploy to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services describe iikshana-backend \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Injecting BACKEND_PUBLIC_URL for WebSocket client: ${BACKEND_URL}"
          gcloud run deploy iikshana-frontend \
            --image us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-frontend:latest \
            --region us-east4 \
            --port 8080 \
            --memory 2Gi \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "PYTHONPATH=${{secrets.PYTHONPATH}},ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},BACKEND_PUBLIC_URL=${BACKEND_URL}" \
            --timeout 300

      - name: Deployment summary
        run: |
          URL=$(gcloud run services describe iikshana-frontend \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "=========================================="
          echo "frontend deployed successfully!"
          echo "Service URL: $URL"
          echo "Image: frontend:${{ github.sha }}"
          echo "=========================================="