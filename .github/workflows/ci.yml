name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Job 1: Data pipeline tests
  # -------------------------------------------------------
  test-data-pipeline:
    name: Data Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-datapipeline-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-datapipeline-

      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile pandas pyyaml fairlearn pytest pytest-cov

      - name: Run data pipeline tests
        working-directory: data-pipeline
        run: |
          pytest tests/ -v \
            --ignore=tests/test_download_datasets.py \
            --ignore=tests/test_evaluate_models.py \
            -k "not gemini" \
            --tb=short \
            --cov=scripts \
            --cov-report=xml:coverage-data-pipeline.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/data-pipeline

      - name: Upload data pipeline coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-pipeline
          path: data-pipeline/coverage-data-pipeline.xml

  # -------------------------------------------------------
  # Job 2: Backend tests
  # -------------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pytest pytest-cov pytest-asyncio pyyaml requests

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage-backend.xml

  # -------------------------------------------------------
  # Job 3: Frontend lint and build check
  # -------------------------------------------------------
  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: frontend
        run: npm run build --if-present

  # -------------------------------------------------------
  # Job 4: Quality gate — all tests must pass
  # -------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-data-pipeline, test-backend, test-frontend]

    steps:
      - name: All checks passed
        run: echo "All CI checks passed. Ready for deployment."