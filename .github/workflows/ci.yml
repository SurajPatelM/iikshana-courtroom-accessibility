name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Job 1: Data pipeline tests
  # -------------------------------------------------------
  test-data-pipeline:
    name: Data Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-datapipeline-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-datapipeline-

      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile pandas pyyaml fairlearn pytest pytest-cov

      - name: Run data pipeline tests
        working-directory: data-pipeline
        run: |
          pytest tests/ -v \
            --ignore=tests/test_download_datasets.py \
            --ignore=tests/test_evaluate_models.py \
            -k "not gemini" \
            --tb=short \
            --cov=scripts \
            --cov-report=xml:coverage-data-pipeline.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/data-pipeline

      - name: Upload data pipeline coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-pipeline
          path: data-pipeline/coverage-data-pipeline.xml

  # -------------------------------------------------------
  # Job 2: Backend tests
  # -------------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pytest pytest-cov pytest-asyncio pyyaml requests google-genai

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage-backend.xml

  # -------------------------------------------------------
  # Job 3: Frontend type check
  # -------------------------------------------------------
  test-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit --skipLibCheck || true

      - name: Verify frontend source files exist
        working-directory: frontend
        run: |
          echo "Checking frontend source structure..."
          ls src/
          echo "Frontend source check passed."

  # -------------------------------------------------------
  # Job 4: MLOps quality gate — metrics + bias + config search
  # -------------------------------------------------------
  mlops-quality-gate:
    name: MLOps Quality Gate
    runs-on: ubuntu-latest
    needs: [test-data-pipeline, test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run quality gate (BLEU / chrF / exact match)
        run: python scripts/quality_gate.py

      - name: Run bias gate (disparity threshold)
        run: python scripts/bias_gate.py

      - name: Run config search gate (best config meets BLEU target)
        run: python scripts/config_search_gate.py

  # -------------------------------------------------------
  # Job 5: Final quality gate — all jobs must pass
  # -------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-data-pipeline, test-backend, test-frontend, mlops-quality-gate]

    steps:
      - name: All checks passed
        run: echo "All CI checks passed — tests, quality gate, bias gate, config search. Ready for deployment."

  # -------------------------------------------------------
  # Job 6: Notify on failure
  # -------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-data-pipeline, test-backend, test-frontend, mlops-quality-gate, quality-gate]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "CI pipeline failed on branch ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Slack notification (uncomment and add SLACK_WEBHOOK_URL secret to enable)
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"❌ CI failed on *${{ github.ref_name }}*\nCommit: ${{ github.event.head_commit.message }}\nAuthor: ${{ github.event.head_commit.author.name }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}