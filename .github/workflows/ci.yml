name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  detect-model-changes:
    name: Detect Model Pipeline Changes
    runs-on: ubuntu-latest
    outputs:
      model_changed: ${{ steps.filter.outputs.model }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed model-related files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            model:
              - "model-pipeline/**"
              - "config/models/**"
              - "scripts/**"
              - "backend/src/services/gemini_translation.py"
              - "backend/src/services/groq_service.py"
              - ".github/workflows/ci.yml"

  # -------------------------------------------------------
  # Job 1: Data pipeline tests
  # -------------------------------------------------------
  test-data-pipeline:
    name: Data Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-datapipeline-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-datapipeline-

      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy soundfile pandas pyyaml fairlearn pytest pytest-cov

      - name: Run data pipeline tests
        working-directory: data-pipeline
        run: |
          pytest tests/ -v \
            --ignore=tests/test_download_datasets.py \
            --ignore=tests/test_evaluate_models.py \
            -k "not gemini" \
            --tb=short \
            --cov=scripts \
            --cov-report=xml:coverage-data-pipeline.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/data-pipeline

      - name: Upload data pipeline coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-pipeline
          path: data-pipeline/coverage-data-pipeline.xml

  # -------------------------------------------------------
  # Job 2: Backend tests
  # -------------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pytest pytest-cov pytest-asyncio pyyaml requests google-genai

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage-backend.xml

  # -------------------------------------------------------
  # Job 3: Frontend type check
  # -------------------------------------------------------
  test-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit --skipLibCheck

      - name: Verify frontend source files exist
        working-directory: frontend
        run: |
          echo "Checking frontend source structure..."
          ls src/
          echo "Frontend source check passed."

  # -------------------------------------------------------
  # Job 4: Model evaluation (runs only for model-related changes)
  # -------------------------------------------------------
  model-evaluation:
    name: Model Evaluation
    runs-on: ubuntu-latest
    needs: [detect-model-changes, test-data-pipeline, test-backend, test-frontend]
    if: ${{ needs.detect-model-changes.outputs.model_changed == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install model evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml requests tqdm sacrebleu fairlearn mlflow scikit-learn matplotlib google-genai

      - name: Run validation
        run: |
          python model-pipeline/scripts/run_validation.py \
            --split dev \
            --config-id translation_flash_v1 \
            --max-rows 20 \
            --delay 0.2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Run bias detection
        run: |
          python model-pipeline/scripts/run_model_bias_detection.py \
            --split dev \
            --config-id translation_flash_v1 \
            --group-cols dataset,emotion \
            --max-rows 20 \
            --delay 0.2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Run config search
        run: |
          python model-pipeline/scripts/run_config_search.py \
            --split dev \
            --configs translation_flash_v1,translation_flash_glossary \
            --max-rows 20 \
            --delay 0.2 \
            --metric bleu
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload model evaluation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-evaluation-artifacts
          path: |
            data/model_runs/**/validation_metrics.json
            data/model_runs/**/validation_metrics.csv
            data/model_runs/**/validation_metrics_bar.png
            data/model_runs/**/validation_segment_bleu_hist.png
            data/model_runs/**/validation_confusion_matrix.png
            data/model_runs/**/model_bias_report_*.json
            data/model_runs/**/model_bias_by_dataset_*.png
            data/model_runs/**/config_search_results*.json
          if-no-files-found: warn

  # -------------------------------------------------------
  # Job 5: MLOps quality gate — metrics + bias + config search
  # -------------------------------------------------------
  mlops-quality-gate:
    name: MLOps Quality Gate
    runs-on: ubuntu-latest
    needs: [detect-model-changes, model-evaluation]
    if: ${{ always() && needs.detect-model-changes.result == 'success' && (needs.model-evaluation.result == 'success' || needs.model-evaluation.result == 'skipped') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run quality gate (BLEU / chrF / exact match)
        if: ${{ needs.detect-model-changes.outputs.model_changed == 'true' }}
        run: python scripts/quality_gate.py

      - name: Run bias gate (disparity threshold)
        if: ${{ needs.detect-model-changes.outputs.model_changed == 'true' }}
        run: python scripts/bias_gate.py

      - name: Run config search gate (best config meets BLEU target)
        if: ${{ needs.detect-model-changes.outputs.model_changed == 'true' }}
        run: python scripts/config_search_gate.py

      - name: Skip model gates for non-model change
        if: ${{ needs.detect-model-changes.outputs.model_changed != 'true' }}
        run: echo "No model-related changes detected; skipping model quality gates."

  # -------------------------------------------------------
  # Job 6: Rollback check
  # -------------------------------------------------------
  rollback-check:
    name: Rollback Check
    runs-on: ubuntu-latest
    needs: [detect-model-changes, mlops-quality-gate]
    if: ${{ always() && needs.detect-model-changes.result == 'success' && needs.mlops-quality-gate.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run rollback check
        if: ${{ needs.detect-model-changes.outputs.model_changed == 'true' }}
        run: python scripts/rollback_check.py

      - name: Skip rollback for non-model change
        if: ${{ needs.detect-model-changes.outputs.model_changed != 'true' }}
        run: echo "No model-related changes detected; skipping rollback check."

  # -------------------------------------------------------
  # Job 7: Final quality gate — all jobs must pass
  # -------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-data-pipeline, test-backend, test-frontend, mlops-quality-gate, rollback-check]

    steps:
      - name: All checks passed
        run: echo "All CI checks passed — tests, quality gate, bias gate, config search. Ready for deployment."

  # -------------------------------------------------------
  # Job 8: Push model package after CI pass (main only)
  # -------------------------------------------------------
  model-registry-push:
    name: Push Model Package
    runs-on: ubuntu-latest
    needs: [quality-gate, detect-model-changes]
    if: ${{ github.ref == 'refs/heads/main' && needs.detect-model-changes.outputs.model_changed == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build model package
        run: |
          python model-pipeline/scripts/build_model_package.py \
            --config-id translation_flash_v1 \
            --tarball
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Push model package to Artifact Registry
        run: |
          python model-pipeline/scripts/push_model_to_registry.py \
            --config-id translation_flash_v1 \
            --method tarball \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --location "${{ secrets.ARTIFACT_REGISTRY_LOCATION }}" \
            --repository model-packages
        env:
          PYTHONPATH: ${{ github.workspace }}

  # -------------------------------------------------------
  # Job 9: Email notification on failure
  # -------------------------------------------------------
  notify-failure:
    name: Notify Failure by Email
    runs-on: ubuntu-latest
    needs: [quality-gate, model-registry-push]
    if: ${{ failure() }}
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[CI Failed] ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            CI pipeline failed.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # -------------------------------------------------------
  # Job 10: Email notification on success
  # -------------------------------------------------------
  notify-success:
    name: Notify Success by Email
    runs-on: ubuntu-latest
    needs: [quality-gate, model-registry-push]
    if: ${{ success() }}
    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[CI Passed] ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            CI pipeline passed.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}