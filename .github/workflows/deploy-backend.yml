name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "requirements.txt"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies and run tests before deploy
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pytest pytest-asyncio pyyaml requests
          cd backend && pytest tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Build Docker image
        run: |
          docker build -t iikshana-backend:${{ github.sha }} \
                       -t iikshana-backend:latest \
                       -f backend/Dockerfile .

      - name: Save Docker image as artifact
        run: |
          docker save iikshana-backend:latest | gzip > iikshana-backend.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: iikshana-backend-image-${{ github.sha }}
          path: iikshana-backend.tar.gz
          retention-days: 7

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Backend deployed successfully"
          echo "Image tag: ${{ github.sha }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo "=========================================="