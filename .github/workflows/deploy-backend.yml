name: Deploy Backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [expo]

env:
  GCP_PROJECT: iikshana-mlops
  GCP_REGION: us-east4
  AR_REPO: iikshana-docker
  IMAGE: us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-backend
  CLOUD_RUN_SERVICE: iikshana-backend

jobs:
  deploy-backend:
    name: Build, Push & Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: Build backend Docker image
        run: |
          docker build \
            --no-cache \
            -t us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-backend:latest \
            -f backend/Dockerfile .

      - name: Push backend Docker image
        run: |
          docker push us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-backend:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy iikshana-backend \
            --image us-east4-docker.pkg.dev/iikshana-mlops/iikshana-docker/iikshana-backend:latest \
            --region us-east4 \
            --cpu-boost \
            --timeout=600 \
            --port 8000 \
            --memory 2Gi \
            --cpu 1 \
            --allow-unauthenticated \
            --use-http2 \
            --session-affinity \
            --set-env-vars "PYTHONPATH=${{ secrets.PYTHONPATH }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}"

      - name: Deployment summary
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "=========================================="
          echo "Backend deployed successfully!"
          echo "Service URL: $URL"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "=========================================="