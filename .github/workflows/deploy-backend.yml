name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run tests before deploy
        run: echo "Backend tests skipped — module not yet implemented"

      - name: Build and push Docker image
        run: echo "Docker build/push skipped — module not yet implemented"

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Backend deploy skipped — module not yet implemented"
          echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "=========================================="