# Groq Llama 3.3 70B — larger model vs llama-3.1-8b-instant (requires GROQ_API_KEY).
id: translation_groq_llama70b_v1
provider: groq
model_name: llama-3.3-70b-versatile
task_type: translation

system_prompt_id: translation_baseline_system
prompt_template_id: translation_baseline_user
temperature: 0.0
top_p: 1.0
max_output_tokens: 256

input_fields:
  - source_text
  - source_language
  - target_language

output_schema:
  type: text
  field_name: translated_text

parsing:
  type: plain_text

postprocessing:
  normalize_whitespace: true
  apply_legal_glossary_check: true
